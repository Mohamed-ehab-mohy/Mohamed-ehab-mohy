<svg width="1200" height="8" viewBox="0 0 1200 8" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="15%" stop-color="#1f6feb" stop-opacity="0.6"/>
      <stop offset="35%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#79c0ff"/>
      <stop offset="65%" stop-color="#58a6ff"/>
      <stop offset="85%" stop-color="#1f6feb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="3" width="1200" height="2" rx="1" fill="url(#dgGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
