<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="35%" stop-color="#0b1120"/>
      <stop offset="65%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#060a12"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb">
        <animate attributeName="stop-color" values="#1f6feb;#388bfd;#1f6feb" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff">
        <animate attributeName="stop-color" values="#79c0ff;#58a6ff;#79c0ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow effects -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#131b2c" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#1f6feb" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="320" fill="url(#dots)" opacity="0.4"/>

  <!-- Glowing orbs -->
  <circle cx="1000" cy="80" r="200" fill="url(#glow1)">
    <animate attributeName="r" values="180;220;180" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="1000;1020;1000" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="260" r="160" fill="url(#glow2)">
    <animate attributeName="r" values="140;180;140" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="260;240;260" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="30" r="100" fill="url(#glow1)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated particle lines -->
  <line x1="0" y1="200" x2="300" y2="180" stroke="#1f6feb" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="900" y1="50" x2="1200" y2="70" stroke="#58a6ff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="280" x2="800" y2="260" stroke="#1f6feb" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Floating code symbols -->
  <text x="1060" y="60" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="28" fill="#1f6feb" opacity="0.5">
    &lt;/&gt;
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="50" y="55" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="22" fill="#58a6ff" opacity="0.4">
    { }
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 10; 0 0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="1100" y="200" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="18" fill="#79c0ff" opacity="0.3">
    async
    <animateTransform attributeName="transform" type="translate" values="0 0; -8 0; 0 0" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="30" y="220" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="16" fill="#1f6feb" opacity="0.25">
    var
    <animateTransform attributeName="transform" type="translate" values="0 0; 6 0; 0 0" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="40" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="14" fill="#58a6ff" opacity="0.2">
    .NET 8
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 5; 0 0" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative hexagon outlines -->
  <polygon points="1120,250 1140,240 1160,250 1160,270 1140,280 1120,270" fill="none" stroke="#1f6feb" stroke-width="0.8" opacity="0.2">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 1140 260;360 1140 260" dur="20s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="80,120 100,110 120,120 120,140 100,150 80,140" fill="none" stroke="#58a6ff" stroke-width="0.6" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="360 100 130;0 100 130" dur="25s" repeatCount="indefinite"/>
  </polygon>

  <!-- Name -->
  <text x="60" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">
    Mohamed Ehab
    <tspan fill="url(#accentGrad)"> Mohy El-Din</tspan>
  </text>

  <!-- Role badge -->
  <rect x="60" y="140" width="320" height="32" rx="16" fill="#1f6feb" opacity="0.12"/>
  <text x="76" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#58a6ff">
    .NET Backend Developer  ·  Clean Architecture  ·  ASP.NET Core
  </text>

  <!-- Animated underline -->
  <rect x="60" y="188" width="0" height="2.5" rx="1.25" fill="url(#lineGrad)">
    <animate attributeName="width" values="0;500;500;0" keyTimes="0;0.35;0.85;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="60" y="220" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#8b949e" font-weight="400">
    Building scalable, production-ready backend systems — one commit at a time.
  </text>

  <!-- Status indicator -->
  <circle cx="74" cy="252" r="5" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="88" y="257" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#3fb950" font-weight="500">
    Open to Work
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="316" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>
